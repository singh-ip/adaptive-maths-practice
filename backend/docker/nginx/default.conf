server {
    listen 80;
    server_name localhost;

    # Document root must point at Laravel's public/ directory
    root /var/www/html/public;
    index index.php;

    # Security: hide Nginx version from error pages and headers
    server_tokens off;

    # Route all requests through Laravel's front controller.
    # Without this, Nginx returns 404 for every API route.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP files to php-fpm
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        # feedback generation + next question generation can run up to ~30s each.
        # 60s gives enough headroom for both on a slow CPU-only Ollama instance.
        fastcgi_read_timeout 60;
        fastcgi_send_timeout 60;
    }

    # Deny direct access to .env, .git, and other sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Increase max body size (answers are tiny, but leave headroom)
    client_max_body_size 10M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
